name: Bug report
description: Something isn't working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below to help us reproduce and fix the issue quickly.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Librarium is affected?
      options:
        - API (librarium-api)
        - Web (librarium-web)
        - iOS (librarium-ios)
        - Media server (librarium-media)
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: API version, app version, or git commit hash
      placeholder: "e.g. 26.4.0 or abc1234"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the bug.
      placeholder: |
        1. Go to…
        2. Click on…
        3. See error…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details (OS, browser, iOS version, Docker version, etc.)
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04
        - Browser: Chrome 125 (for web issues)
        - iOS: 18.2 on iPhone 15 Pro (for iOS issues)
        - PostgreSQL: 16
        - Deployment: Docker Compose / bare metal
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any API logs, browser console errors, or crash reports here.
      render: text
    validations:
      required: false
